<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Money Mindset User Flow</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0d0f0e; color: #e8ede8; min-height: 100vh; }

  /* ── HEADER ── */
  .header { background: #141716; border-bottom: 1px solid #2a3030; padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
  .logo { width: 34px; height: 34px; background: #d4a843; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .header-title { font-size: 18px; font-weight: 700; color: #e8ede8; }
  .header-sub { font-size: 11px; color: #4a5e5a; letter-spacing: 0.08em; font-family: 'Courier New', monospace; }

  /* ── PHASE RAIL ── */
  .layout { display: flex; height: calc(100vh - 65px); }
  .rail { width: 200px; flex-shrink: 0; background: #141716; border-right: 1px solid #2a3030; overflow-y: auto; padding: 16px 0; }
  .phase-btn { width: 100%; padding: 10px 16px; border: none; background: none; color: #4a5e5a; cursor: pointer; text-align: left; font-size: 12px; font-weight: 600; letter-spacing: 0.06em; font-family: 'Courier New', monospace; transition: all 0.2s; display: flex; align-items: center; gap: 10px; }
  .phase-btn:hover { color: #8a9e9a; background: #1c2020; }
  .phase-btn.active { color: #d4a843; background: rgba(212,168,67,0.08); border-right: 2px solid #d4a843; }
  .phase-dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
  .phase-btn.done .phase-dot { background: #4ade80; }
  .phase-btn.done { color: #4a5e5a; }
  .phase-btn.done .phase-dot { background: #166534; }

  /* ── MAIN CONTENT ── */
  .main { flex: 1; overflow-y: auto; padding: 28px 32px; }
  .phase-header { margin-bottom: 24px; }
  .phase-tag { font-size: 10px; font-family: 'Courier New', monospace; letter-spacing: 0.12em; color: #4a5e5a; margin-bottom: 6px; }
  .phase-title { font-size: 26px; font-weight: 800; color: #e8ede8; margin-bottom: 6px; }
  .phase-desc { font-size: 14px; color: #8a9e9a; line-height: 1.6; max-width: 560px; }

  /* ── FLOW NODES ── */
  .flow { display: flex; flex-direction: column; gap: 0; }
  .node-row { display: flex; gap: 12px; align-items: flex-start; margin-bottom: 4px; }
  .node-row.centered { justify-content: center; }
  .node-row.split { justify-content: space-between; }

  .node { border-radius: 10px; padding: 14px 18px; border: 1px solid; flex: 1; max-width: 340px; cursor: pointer; transition: all 0.2s; position: relative; }
  .node:hover { transform: translateY(-1px); }
  .node.full { max-width: 100%; }
  .node.half { max-width: 48%; }
  .node.third { max-width: 31%; }

  .node.purple { background: rgba(83,74,183,0.12); border-color: rgba(83,74,183,0.4); }
  .node.purple:hover { border-color: #534AB7; box-shadow: 0 4px 20px rgba(83,74,183,0.2); }
  .node.teal { background: rgba(15,110,86,0.12); border-color: rgba(15,110,86,0.4); }
  .node.teal:hover { border-color: #0F6E56; }
  .node.amber { background: rgba(133,79,11,0.15); border-color: rgba(212,168,67,0.35); }
  .node.amber:hover { border-color: #d4a843; }
  .node.green { background: rgba(22,101,52,0.12); border-color: rgba(22,101,52,0.4); }
  .node.green:hover { border-color: #166534; }
  .node.coral { background: rgba(153,60,29,0.12); border-color: rgba(153,60,29,0.4); }
  .node.coral:hover { border-color: #993C1D; }
  .node.blue { background: rgba(24,95,165,0.12); border-color: rgba(24,95,165,0.4); }
  .node.blue:hover { border-color: #185FA5; }
  .node.pink { background: rgba(153,53,86,0.15); border-color: rgba(212,83,126,0.4); }
  .node.pink:hover { border-color: #D4537E; }
  .node.gray { background: rgba(50,50,48,0.4); border-color: #3a4545; }
  .node.gray:hover { border-color: #5F5E5A; }

  .node-tag { font-size: 10px; font-family: 'Courier New', monospace; letter-spacing: 0.08em; margin-bottom: 5px; opacity: 0.7; }
  .node-title { font-size: 14px; font-weight: 700; color: #e8ede8; margin-bottom: 3px; }
  .node-detail { font-size: 12px; color: #8a9e9a; line-height: 1.5; }

  /* ── ARROW ── */
  .arrow { text-align: center; color: #3a4545; font-size: 18px; margin: 6px 0; line-height: 1; }
  .arrow.split-out { display: flex; justify-content: space-around; color: #3a4545; }
  .arrow-label { font-size: 10px; font-family: 'Courier New', monospace; color: #4a5e5a; text-align: center; margin: 2px 0; }

  /* ── QUIZ GRID ── */
  .quiz-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin: 8px 0; }
  .quiz-card { background: rgba(133,79,11,0.12); border: 1px solid rgba(212,168,67,0.3); border-radius: 10px; padding: 14px 10px; text-align: center; cursor: pointer; transition: all 0.2s; }
  .quiz-card:hover { border-color: #d4a843; background: rgba(212,168,67,0.1); }
  .quiz-num { font-size: 22px; font-weight: 800; color: #d4a843; display: block; }
  .quiz-label { font-size: 11px; color: #8a9e9a; margin-top: 4px; }
  .quiz-sub { font-size: 10px; color: #4a5e5a; margin-top: 3px; line-height: 1.3; }

  /* ── AI OUTPUT GRID ── */
  .ai-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }

  /* ── FIRST SESSION GRID ── */
  .session-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }

  /* ── PROGRESSION SPLIT ── */
  .prog-split { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin: 8px 0; }
  .prog-path { display: flex; flex-direction: column; gap: 8px; }
  .prog-path-label { font-size: 10px; font-family: 'Courier New', monospace; letter-spacing: 0.08em; color: #4a5e5a; text-align: center; }

  /* ── RETENTION ROW ── */
  .retention-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

  /* ── LOOP BADGE ── */
  .loop-badge { background: rgba(26,31,30,0.8); border: 1px dashed #2a3030; border-radius: 8px; padding: 10px 16px; text-align: center; }
  .loop-badge span { font-size: 11px; color: #4a5e5a; font-family: 'Courier New', monospace; }

  /* ── NAV ── */
  .nav { display: flex; gap: 12px; margin-top: 32px; padding-top: 24px; border-top: 1px solid #2a3030; }
  .btn { padding: 10px 22px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s; font-family: 'Segoe UI', sans-serif; }
  .btn-prev { background: transparent; border: 1px solid #3a4545; color: #8a9e9a; }
  .btn-prev:hover { border-color: #8a9e9a; color: #e8ede8; }
  .btn-next { background: #d4a843; border: 1px solid #d4a843; color: #0d0f0e; margin-left: auto; }
  .btn-next:hover { background: #e0b84f; }
  .btn-next:disabled { opacity: 0.3; cursor: not-allowed; }

  /* ── PROGRESS BAR ── */
  .progress-wrap { background: #1c2020; border-radius: 2px; height: 3px; margin-bottom: 20px; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #8a6c2a, #d4a843); border-radius: 2px; transition: width 0.4s ease; }

  /* ── STAT CHIPS ── */
  .chips { display: flex; gap: 8px; flex-wrap: wrap; margin: 12px 0; }
  .chip { background: #1c2020; border: 1px solid #2a3030; border-radius: 6px; padding: 5px 12px; font-size: 11px; color: #8a9e9a; font-family: 'Courier New', monospace; }
  .chip.gold { border-color: #8a6c2a; color: #d4a843; }
  .chip.green { border-color: #166534; color: #4ade80; }
  .chip.red { border-color: #7f1d1d; color: #f87171; }

  .divider { border: none; border-top: 1px solid #2a3030; margin: 16px 0; }

  /* ── AI CALLOUT ── */
  .ai-callout { background: rgba(83,74,183,0.08); border: 1px solid rgba(83,74,183,0.3); border-radius: 10px; padding: 14px 18px; margin: 12px 0; }
  .ai-callout-title { font-size: 11px; font-family: 'Courier New', monospace; color: #7F77DD; letter-spacing: 0.08em; margin-bottom: 6px; }
  .ai-callout-body { font-size: 13px; color: #8a9e9a; line-height: 1.6; }

  @media (max-width: 768px) {
    .rail { width: 52px; }
    .phase-btn span:last-child { display: none; }
    .quiz-grid { grid-template-columns: repeat(3, 1fr); }
    .ai-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">💰</div>
  <div>
    <div class="header-title">Money Mindset</div>
    <div class="header-sub">USER FLOW · NEW USER JOURNEY</div>
  </div>
</div>

<div class="layout">
  <!-- ── PHASE RAIL ── -->
  <nav class="rail" id="rail"></nav>

  <!-- ── MAIN ── -->
  <main class="main" id="main">
    <div class="progress-wrap"><div class="progress-fill" id="progress"></div></div>
    <div id="content"></div>
    <div class="nav">
      <button class="btn btn-prev" id="btnPrev" onclick="go(-1)">← Back</button>
      <button class="btn btn-next" id="btnNext" onclick="go(1)">Next phase →</button>
    </div>
  </main>
</div>

let current = 0;

function renderRail() {
  const rail = document.getElementById('rail');
  rail.innerHTML = PHASES.map((p, i) => `
    <button class="phase-btn ${i === current ? 'active' : i < current ? 'done' : ''}" onclick="jump(${i})">
      <span class="phase-dot"></span>
      <span>${p.label}</span>
    </button>
  `).join('');
}

function renderContent() {
  const pct = ((current + 1) / PHASES.length * 100).toFixed(0);
  document.getElementById('progress').style.width = pct + '%';

  const p = PHASES[current];
  document.getElementById('content').innerHTML = `
    <div class="phase-header">
      <div class="phase-tag">PHASE ${current + 1} OF ${PHASES.length}</div>
      <div class="phase-title">${p.title}</div>
      <div class="phase-desc">${p.desc}</div>
    </div>
    ${p.render()}
  `;

  document.getElementById('btnPrev').disabled = current === 0;
  document.getElementById('btnNext').textContent = current === PHASES.length - 1 ? '✓ Complete' : 'Next phase →';
  document.getElementById('btnNext').disabled = false;

  document.getElementById('main').scrollTop = 0;
}

function go(dir) {
  const next = current + dir;
  if (next >= 0 && next < PHASES.length) {
    current = next;
    renderRail();
    renderContent();
  }
}

function jump(i) {
  current = i;
  renderRail();
  renderContent();
}

renderRail();
renderContent();
</script>
